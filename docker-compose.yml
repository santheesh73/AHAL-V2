services:
  ahal-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AHAL_STORAGE_BACKEND: ${AHAL_STORAGE_BACKEND:-memory}
      AHAL_LLM_ENABLED: ${AHAL_LLM_ENABLED:-false}
      AHAL_LLM_MODEL: ${AHAL_LLM_MODEL:-gemma-26b-it}
      AHAL_LLM_TIMEOUT_SECONDS: ${AHAL_LLM_TIMEOUT_SECONDS:-120}
      AHAL_SESSION_TTL_HOURS: ${AHAL_SESSION_TTL_HOURS:-24}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB: ${MONGODB_DB:-ahal_ai}
    restart: unless-stopped

  mongo:
    image: mongo:7
    profiles: ["mongo"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-ahal_ai}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
